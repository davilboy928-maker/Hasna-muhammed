<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Face Blur</title>
    <style>
        .image-container {
            position: relative;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            filter: blur(5px);
            transition: filter 0.3s ease;
        }

        .image-container:hover img {
            filter: blur(0);
        }

        .face-blur {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 40%;
            backdrop-filter: blur(10px);
            display: block;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="path/to/your/image.jpg" alt="An example image">
        <div class="face-blur"></div>
    </div>
</body>
</html>
